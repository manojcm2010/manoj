name: SonarQube Scan

on:
  push:
    branches:
      - main
      - master

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      # Java (required for Sonar)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------------------
      # Node (MERN) Support
      # ---------------------------
      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        run: npm install

      - name: Run Node tests with coverage
        if: hashFiles('package.json') != ''
        run: |
          npm test -- --coverage || true

      # ---------------------------
      # Python Support
      # ---------------------------
      - name: Setup Python
        if: hashFiles('requirements.txt') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: |
          pip install -r requirements.txt || true
          pip install pytest coverage

      - name: Run Python tests with coverage
        if: hashFiles('requirements.txt') != ''
        run: |
          coverage run -m pytest || true
          coverage xml || true

      # ---------------------------
      # Debug (VERY IMPORTANT)
      # ---------------------------
      - name: Check coverage files
        run: |
          echo "Listing files..."
          ls -R
          echo "Searching coverage files..."
          find . -name "coverage.xml"
          find . -name "lcov.info"

      # ---------------------------
      # SonarQube Scan
      # ---------------------------
      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: http://54.162.248.144:9000
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.sources=.
            -Dsonar.login=squ_4f7ac18302a201ff8063adbbe59d1c2f8bdb4307
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
